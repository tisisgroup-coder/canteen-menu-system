<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TUP Taguig Canteen Menu Board</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <h1>DEVELOPMENT OF A MESSENGER-BASED DIGITAL MENU BOARD WITH FEEDBACK SYSTEM FOR THE TECHNOLOGICAL UNIVERSITY OF THE PHILIPPINES – TAGUIG CAMPUS CANTEEN</h1>
  </header>

  <div id="menu-grid"></div>

  <footer>
    <div class="footer-left">
      <img src="/qr.png" alt="QR Code" id="qr-img"/>
      <div class="footer-text">
        <strong>Scan to View Menu on Phone</strong>
        <span>View the canteen Menu on your phone!</span>
        <span id="stall-label">For Stalls: --</span>
      </div>
    </div>
    <div class="footer-right">
      <div class="countdown-box">
        <div class="countdown-label">NEXT UPDATE IN</div>
        <div id="countdown">10s</div>
        <div id="page-label">Page 1 of 4</div>
      </div>
    </div>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="display.js"></script>
</body>
</html>
